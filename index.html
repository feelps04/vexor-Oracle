<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SENTINEL DASHBOARD - ULTRA LATENCY</title>
    <style>
        body { background: #020617; color: #38bdf8; font-family: 'Consolas', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #monitor { background: #0f172a; padding: 30px; border-radius: 15px; border: 2px solid #1e293b; width: 90%; max-width: 800px; box-shadow: 0 0 30px rgba(56, 189, 248, 0.1); }
        .status { font-size: 1.2em; font-weight: bold; margin-bottom: 20px; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
        .connected { background: #064e3b; color: #4ade80; border-color: #059669; box-shadow: 0 0 15px rgba(74, 222, 128, 0.2); }
        .error { background: #450a0a; color: #f87171; border-color: #dc2626; }
        pre { background: #000; padding: 20px; border-radius: 10px; color: #10b981; border: 1px solid #064e3b; font-size: 1.2em; min-height: 200px; overflow: auto; }
    </style>
</head>
<body>
    <div id="monitor">
        <div id="status" class="status error">🛰️ BUSCANDO SINALIZAÇÃO LOCAL...</div>
        <pre id="display">Inicie o 'node fast_server.js' para começar.</pre>
    </div>

    <script type="module">
        import geckos from '/geckos/bundle.js'

        window.onload = () => {
            const statusDiv = document.getElementById('status');
            const display = document.getElementById('display');
            
            // Conecta no próprio servidor Node que serve a página
            const channel = geckos({ port: 3000, authorization: null });

            channel.onConnect(error => {
                if (error) {
                    statusDiv.innerText = "⚠️ AGUARDANDO NODE.JS (PORTA 3000)";
                    statusDiv.className = 'status error';
                } else {
                    statusDiv.innerText = "✅ SENTINEL CONECTADO (UDP/WebRTC)";
                    statusDiv.className = 'status connected';
                    display.innerText = "Pronto para receber preços da Pepperstone/B3...";
                }
            });

            channel.on('tick', (data) => {
                display.innerText = JSON.stringify(data, null, 2);
            });
        };
    </script>
</body>
</html>
